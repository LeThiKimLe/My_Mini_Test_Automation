name: CD - Publish Allure Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Allure report to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Playwright Chromium
        run: >
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.1.0:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run tests and generate Allure report
        run: mvn -B clean test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Fail job when tests fail
        if: always()
        shell: bash
        run: |
          if [ -d target/surefire-reports ] && find target/surefire-reports -name '*.xml' -print -quit | grep -q .; then
            if grep -R -E 'failures="[1-9][0-9]*"|errors="[1-9][0-9]*"' target/surefire-reports/*.xml; then
              echo "One or more tests failed. The Allure report was still generated for debugging."
              exit 1
            fi
          fi
