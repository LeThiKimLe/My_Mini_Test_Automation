name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Maven Playwright tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Playwright Chromium
        run: >
          mvn -B org.codehaus.mojo:exec-maven-plugin:3.1.0:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run tests and generate Allure report
        run: mvn -B clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-report
          if-no-files-found: ignore

      - name: Fail job when tests fail
        if: always()
        shell: bash
        run: |
          if [ -d target/surefire-reports ] && find target/surefire-reports -name '*.xml' -print -quit | grep -q .; then
            if grep -R -E 'failures="[1-9][0-9]*"|errors="[1-9][0-9]*"' target/surefire-reports/*.xml; then
              echo "One or more tests failed. Check the uploaded Allure report artifact."
              exit 1
            fi
          fi
